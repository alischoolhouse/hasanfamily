<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hasan Family Archive</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-dark: #1a1612;
    --card-male: #242b35;
    --card-female: #35242b;
    --border-male: #4a6fa5;
    --border-female: #a54a6f;
    --gold: #c9973e;
    --text-main: #e0dcd5;
    --text-muted: #a09a90;
    --cream-soft: #f4eee0;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  
  body {
    font-family: 'Lato', sans-serif;
    background: var(--bg-dark);
    color: var(--text-main);
    line-height: 1.6;
    user-select: none;
  }

  header {
    text-align: center;
    padding: 4rem 1rem 3rem;
    background: linear-gradient(180deg, #25201a 0%, var(--bg-dark) 100%);
    border-bottom: 1px solid #332d26;
  }

  header h1 {
    font-family: 'Playfair Display', serif;
    font-size: 2.8rem;
    color: var(--gold);
    letter-spacing: 0.05em;
    margin-bottom: 0.5rem;
  }

  header p { color: var(--text-muted); font-weight: 300; letter-spacing: 1px; }

  .tree-wrapper { overflow-x: auto; padding: 4rem 1rem 6rem; }
  .tree-container { min-width: 1100px; position: relative; }
  .generation { display: flex; justify-content: center; gap: 40px; }
  
  .gen-label {
    text-align: center; font-size: 0.75rem; font-weight: 700;
    letter-spacing: 0.25em; text-transform: uppercase;
    color: var(--gold); margin-bottom: 25px; opacity: 0.8;
  }

  /* Darker Cards */
  .person-card {
    width: 160px; border-radius: 10px; padding: 22px 12px;
    text-align: center; border: 1px solid;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    cursor: pointer; transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
  }

  .person-card:hover { transform: translateY(-8px); filter: brightness(1.2); }
  
  .person-card.male { background: var(--card-male); border-color: var(--border-male); }
  .person-card.female { background: var(--card-female); border-color: var(--border-female); }

  .emoji-icon { font-size: 1.8rem; margin-bottom: 12px; display: block; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3)); }
  .person-name { font-family: 'Playfair Display', serif; font-weight: 700; font-size: 1rem; color: #fff; }
  .person-dates { font-size: 0.75rem; color: var(--text-muted); margin-top: 8px; }
  .info-btn { font-size: 0.6rem; color: var(--gold); text-transform: uppercase; margin-top: 15px; font-weight: 700; border: 1px solid var(--gold); padding: 2px 8px; border-radius: 4px; display: inline-block; }

  .couple-group { display: flex; align-items: flex-start; gap: 12px; }
  .couple-divider { padding-top: 60px; color: var(--gold); font-size: 1.4rem; opacity: 0.4; }
  .gen-spacer { height: 80px; }

  /* Info Modal */
  .modal-bg {
    display: none; position: fixed; inset: 0;
    background: rgba(46,31,14,0.75); z-index: 100;
    align-items: center; justify-content: center; backdrop-filter: blur(8px);
  }
  .modal-bg.open { display: flex; }
  .modal {
    background: #25211d; padding: 45px; border-radius: 15px;
    max-width: 450px; width: 90%; position: relative; text-align: center;
    border: 1px solid #3d352d; box-shadow: 0 20px 50px rgba(0,0,0,1);
  }
  .modal h2 { font-family: 'Playfair Display', serif; font-size: 2rem; color: var(--gold); margin-bottom: 10px; }
  .modal-dates { color: var(--text-muted); margin-bottom: 30px; font-style: italic; }
  .modal-bio { text-align: left; border-top: 1px solid #3d352d; padding-top: 25px; color: #d0c8bd; line-height: 1.8; }
  .close-btn { position: absolute; top: 20px; right: 20px; font-size: 26px; cursor: pointer; border: none; background: none; color: #666; transition: color 0.2s; }
  .close-btn:hover { color: var(--gold); }
</style>
</head>
<body>

<header>
  <h1>The Family Heritage</h1>
  <p>A Permanent Record of Our Ancestors</p>
</header>

<div class="tree-wrapper">
  <div class="tree-container" id="tree-root"></div>
</div>

<div class="modal-bg" id="modal-bg">
  <div class="modal">
    <button class="close-btn" onclick="closeModal()">✕</button>
    <h2 id="m-name"></h2>
    <div class="modal-dates" id="m-dates"></div>
    <div class="modal-bio" id="m-bio"></div>
  </div>
</div>

<script>
/**
 * DATA (READ-ONLY)
 */
const familyData = {
  // 4 Grandparents (2 Couples)
  grandparents: [
    { id: 'gp1', name: 'Abdul Matin', gender: 'male', born: '1920', died: '1990', bio: 'A respected elder known for his wisdom and leadership in the community.' },
    { id: 'gp2', name: 'Bibi Soghra Khatoon', gender: 'female', born: '1925', died: '1993', bio: 'The matriarch who cherished family gatherings and traditional cooking.' },
    { id: 'gp3', name: 'Sultan Mahmood', gender: 'male', born: '1930', died: '2013', bio: 'A visionary who dedicated his life to education and architecture.' },
    { id: 'gp4', name: 'Shamsun Nihar', gender: 'female', born: '1935', died: '2024', bio: 'A lover of literature and art, remembered for her gentle spirit.' }
  ],
  parents: [
    { id: 'p1', name: 'Wajedul Hasan', gender: 'male', born: '1969', died: '', bio: 'An engineer with a passion for innovation and classic design.' },
    { id: 'p2', name: 'Bibi Shabistan Begum', gender: 'female', born: '1973', died: '', bio: 'A talented artist whose works capture the beauty of the natural world.' }
  ],
  children: [
    { id: 'c1', name: 'Noorul Hasan', gender: 'male', born: '1996', died: '', bio: 'Software Architect.' },
    { id: 'c2', name: 'Bilal Hasan', gender: 'male', born: '1999', died: '', bio: 'Medical Doctor.' },
    { id: 'c3', name: 'Ali Hasan', gender: 'male', born: '2003', died: '', bio: 'University Student.' },
    { id: 'c4', name: 'Imam Hasan', gender: 'male', born: '2006', died: '', bio: 'Aspiring Designer.' }
  ]
};

function renderCard(person) {
  const b = person.born ? `b. ${person.born}` : '';
  const d = person.died ? `d. ${person.died}` : (person.born ? 'Present' : '');
  // Facial emojis
  const emoji = person.gender === 'male' ? '👨‍💼' : '👩‍💼';
  
  return `
    <div class="person-card ${person.gender}" onclick="viewPerson('${person.id}')">
      <span class="emoji-icon">${emoji}</span>
      <div class="person-name">${person.name}</div>
      <div class="person-dates">${b}${d ? ' — ' + d : ''}</div>
      <div class="info-btn">Biography</div>
    </div>`;
}

function init() {
  const root = document.getElementById('tree-root');
  const gens = [
    { label: 'Grandparents', key: 'grandparents', pairs: [[0,1],[2,3]] },
    { label: 'Parents', key: 'parents', pairs: [[0,1]] },
    { label: 'Current Generation', key: 'children', pairs: null }
  ];

  gens.forEach((gen, i) => {
    const container = document.createElement('div');
    container.innerHTML = `<div class="gen-label">${gen.label}</div>`;
    const row = document.createElement('div');
    row.className = 'generation';

    if (gen.pairs) {
      gen.pairs.forEach(pair => {
        const group = document.createElement('div');
        group.className = 'couple-group';
        group.innerHTML = renderCard(familyData[gen.key][pair[0]]) + `<div class="couple-divider">❦</div>` + renderCard(familyData[gen.key][pair[1]]);
        row.appendChild(group);
      });
    } else {
      familyData[gen.key].forEach(p => {
        const wrap = document.createElement('div');
        wrap.innerHTML = renderCard(p);
        row.appendChild(wrap.firstElementChild);
      });
    }

    container.appendChild(row);
    if (i < gens.length - 1) container.innerHTML += `<div class="gen-spacer"></div>`;
    root.appendChild(container);
  });
}

function viewPerson(id) {
  let p = null;
  Object.values(familyData).forEach(g => {
    const found = g.find(x => x.id === id);
    if (found) p = found;
  });

  if (p) {
    document.getElementById('m-name').textContent = p.name;
    document.getElementById('m-dates').textContent = (p.born ? 'b. ' + p.born : '') + (p.died ? ' — d. ' + p.died : ' — Present');
    document.getElementById('m-bio').textContent = p.bio || "Historical record coming soon.";
    document.getElementById('modal-bg').classList.add('open');
  }
}

function closeModal() { document.getElementById('modal-bg').classList.remove('open'); }
document.getElementById('modal-bg').onclick = (e) => { if(e.target.id === 'modal-bg') closeModal(); };

init();
</script>
</body>
</html>
